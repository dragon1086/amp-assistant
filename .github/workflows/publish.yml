name: Publish to PyPI

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:  # 수동 트리거도 가능

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install pytest pytest-asyncio
      - name: Install package
        run: pip install ".[dev]"
      - name: Run tests
        run: python -m pytest tests/ -q --ignore=tests/test_emergent.py
        continue-on-error: true  # 통합 테스트는 API 키 없으면 실패 가능

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build package
        run: |
          pip install build
          python -m build
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Trusted Publishing (토큰 없이도 가능!)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Trusted Publishing 사용 — PYPI_TOKEN 불필요!
        # PyPI에서 GitHub repo 신뢰 설정만 하면 됨
