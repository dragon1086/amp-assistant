# amp configuration example
# Copy this to ~/.amp/config.yaml and fill in your values
# Environment variables override these settings

agents:
  agent_a:
    provider: openai
    model: gpt-5.2
  agent_b:
    provider: anthropic
    model: claude-sonnet-4-6

telegram:
  # Telegram bot token from @BotFather
  # Can also be set via TELEGRAM_BOT_TOKEN env var
  token: ${TELEGRAM_BOT_TOKEN}

amp:
  # Default processing mode:
  #   auto      - Automatically detect best mode (recommended)
  #   solo      - Always use single LLM call (fastest)
  #   pipeline  - Always use plan→solve→review→fix pipeline
  #   emergent  - Always use 2-agent independent analysis
  default_mode: auto

  # Local knowledge graph storage path (SQLite)
  kg_path: ~/.amp/kg.db
