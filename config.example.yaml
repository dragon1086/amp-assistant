# amp configuration example
# Copy this to ~/.amp/config.yaml and fill in your values
# Environment variables override these settings

llm:
  provider: anthropic_oauth  # primary: Claude OAuth (free via Claude Code)
  openai_model: gpt-5.2      # only used for Emergent Agent A (cross-provider diversity)
  embedding_model: text-embedding-3-small  # OpenAI only — no Claude equivalent

agents:
  # Agent A & B는 자유롭게 조합 가능
  # 교차 벤더(권장): CSER 높음, 독창적 관점 충돌 최대화
  # 같은 벤더:       동작하지만 CSER 낮아질 수 있음 (비슷한 답 경향)

  agent_a:
    provider: openai
    model: gpt-4o            # openai | anthropic | anthropic_oauth | local
  agent_b:
    provider: anthropic_oauth
    model: claude-sonnet-4-6  # Claude Code OAuth = 무료

  # 같은 벤더 예시 (GPT끼리):
  # agent_a: {provider: openai, model: gpt-4o}
  # agent_b: {provider: openai, model: gpt-4.1}

  # 같은 벤더 예시 (Claude끼리):
  # agent_a: {provider: anthropic_oauth, model: claude-opus-4-6}
  # agent_b: {provider: anthropic_oauth, model: claude-sonnet-4-6}

  # 로컬 모델 (Ollama):
  # agent_a: {provider: local, model: llama3.3}
  # agent_b: {provider: local, model: mistral}

telegram:
  # Telegram bot token from @BotFather
  # Can also be set via TELEGRAM_BOT_TOKEN env var
  token: ${TELEGRAM_BOT_TOKEN}

amp:
  # Default processing mode:
  #   auto      - Automatically detect best mode (recommended)
  #   solo      - Always use single LLM call (fastest)
  #   pipeline  - Always use plan→solve→review→fix pipeline
  #   emergent  - Always use 2-agent independent analysis
  default_mode: auto

  # Local knowledge graph storage path (SQLite)
  kg_path: ~/.amp/kg.db

plugins:
  # image_vision: analyze photos sent to the bot (GPT-4o Vision)
  image_vision:
    provider: openai  # only openai supported for now

  # image_gen: generate images with /imagine <prompt>
  image_gen:
    backend: nanonbanana2   # nanonbanana2 | dalle3 | local | replicate
    #
    # nanonbanana2 = Google Gemini 3.1 Flash Image (출시: 2026-02-26)
    #   - 최대 4K 해상도, ~4초 생성, ~$0.10/장
    #   - 필요: GOOGLE_API_KEY (유료 tier)
    gemini_model: gemini-3.1-flash-image-preview
    #
    # local = Automatic1111 / ComfyUI (나노바나나2 등 로컬 서버)
    local_url: http://localhost:7860

mcp:
  # MCP (Model Context Protocol) server connections
  # Each entry requires: name and url
  servers: []
  # Example:
  # servers:
  #   - name: filesystem
  #     url: http://localhost:3001
  #   - name: brave-search
  #     url: http://localhost:3002
