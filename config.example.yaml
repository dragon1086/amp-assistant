# amp configuration example
# Copy this to ~/.amp/config.yaml and fill in your values
# 최신 모델 기준: 2026-03

llm:
  provider: anthropic_oauth  # reconciler 기본: Claude OAuth (무료)
  openai_model: gpt-5.2      # Agent A 기본 (cross-vendor diversity 최대화)
  embedding_model: text-embedding-3-small  # OpenAI embedding (변경 불필요)

agents:
  # ── Agent A & B 조합 가이드 ──────────────────────────────────
  # 교차 벤더(권장): GPT-5.x × Claude → CSER 최고, 독창적 관점 충돌 최대화
  # 같은 벤더:       동작하지만 CSER 낮아질 수 있음 (echo-chamber 위험)

  agent_a:
    provider: openai
    model: gpt-5.2            # 최신 최상위 (2026-03)
                              # 대안: gpt-5.1, gpt-5, gpt-5-mini (비용↓)
    reasoning_effort: high    # none | low | medium | high | xhigh
                              # emergent 분석: high 권장 (xhigh = 최대 추론, 느림)
                              # solo/빠른 응답: low | medium

  agent_b:
    provider: anthropic_oauth
    model: claude-sonnet-4-6  # 최신 (2026-03), OAuth = 무료
                              # 최고 품질 원하면: claude-opus-4-6 (유료 API 필요)
    # thinking: adaptive      # anthropic provider 사용 시만 적용
                              # adaptive: 모델이 자율 결정 (비용 효율적, 권장)
                              # enabled:  항상 extended thinking (깊은 추론, 비용↑)

  # ── 고품질 옵션 (유료 API, ANTHROPIC_API_KEY 필요) ─────────
  # agent_b:
  #   provider: anthropic
  #   model: claude-opus-4-6  # 최상위 Claude, 에이전트/코딩/복잡 추론
  #   thinking: adaptive       # 비용 효율적 extended thinking

  # ── 비용 절감 옵션 ──────────────────────────────────────────
  # agent_a:
  #   provider: openai
  #   model: gpt-5-mini        # GPT-5 계열 가장 저렴
  #   reasoning_effort: low
  # agent_b:
  #   provider: anthropic_oauth
  #   model: claude-haiku-4-5  # 가장 빠른 Claude

  # ── 로컬 모델 (Ollama, 완전 무료) ──────────────────────────
  # agent_a: {provider: local, model: llama3.3}
  # agent_b: {provider: local, model: mistral}

  # ── 같은 벤더 (persona diversity 실험용) ───────────────────
  # agent_a: {provider: openai, model: gpt-5.2, reasoning_effort: high}
  # agent_b: {provider: openai, model: gpt-5.2, reasoning_effort: low}
  # → CSER 낮아질 수 있음; 페르소나 주입으로 일부 보완

telegram:
  token: ${TELEGRAM_BOT_TOKEN}

amp:
  default_mode: auto  # auto | solo | pipeline | emergent
  kg_path: ~/.amp/kg.db

plugins:
  image_vision:
    provider: openai

  image_gen:
    backend: nanonbanana2            # gemini-3.1-flash-image-preview (나노바나나2)
    gemini_model: gemini-3.1-flash-image-preview
    # 대안 백엔드: dalle3, replicate, local

  claude_executor:
    workdir: ~/amp
    timeout: 120
    max_output: 3000
